<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="メモ帳">
<title>✏ メモ帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:15px;min-height:100dvh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.app{max-width:640px;margin:0 auto;min-height:100dvh;padding-bottom:96px}

/* ── Header ── */
.hd{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--bd);padding:12px 16px 8px}
.hd-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.app-ttl{font-size:1.05rem;font-weight:600;color:var(--ac);letter-spacing:.05em;flex:1}
.theme-btn,.bkp-btn{background:var(--sf);border:1px solid var(--bd);color:var(--mu);padding:4px 9px;border-radius:6px;font-size:.75rem;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.srch{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:8px;font-size:16px;font-family:inherit;outline:none;margin-bottom:8px}
.srch::placeholder{color:var(--mu)}
.tags-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tags-row::-webkit-scrollbar{display:none}
.tg-chip{white-space:nowrap;padding:3px 10px;border-radius:999px;font-size:.76rem;background:var(--tg);color:var(--tgt);border:1px solid transparent;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.tg-chip.on{border-color:var(--ac);color:var(--ac)}

/* ── List ── */
.list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.empty{text-align:center;color:var(--mu);padding:60px 20px;font-size:.9rem;line-height:1.9}

/* ── Card ── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;transition:border-color .15s}
.card.starred{border-color:var(--st)}
.c-head{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 4px}
.star{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--mu);flex-shrink:0;line-height:1;padding:4px;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.star.on{color:var(--st)}
.star:active{transform:scale(.82)}
.ts{font-size:.7rem;color:var(--mu);flex:1;padding-top:6px}
.del{background:none;border:none;cursor:pointer;color:var(--mu);font-size:1.1rem;padding:4px 6px;opacity:.4;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.del:hover,.del:active{opacity:1}
.c-body{padding:0 12px 6px}
.c-title{font-size:.95rem;font-weight:600;color:var(--tx);margin-bottom:4px;line-height:1.4}
.c-text{font-size:.87rem;color:var(--tx);opacity:.85;line-height:1.7;white-space:pre-wrap;word-break:break-word}

/* ── Appends ── */
.ap-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ap-block{border-left:2px solid var(--ap);padding:3px 0 3px 8px}
.ap-date{font-size:.66rem;color:var(--ap);opacity:.7;margin-bottom:2px}
.ap-txt{font-size:.85rem;color:var(--ap);line-height:1.65;white-space:pre-wrap;word-break:break-word}
.ap-del{background:none;border:none;cursor:pointer;color:var(--ap);font-size:.9rem;padding:1px 5px;opacity:.5;transition:opacity .15s;line-height:1;-webkit-tap-highlight-color:transparent}
.ap-del:active{opacity:1}

/* ── Card footer ── */
.c-foot{display:flex;align-items:center;gap:6px;padding:4px 12px 8px;flex-wrap:wrap}
.c-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.c-tag{font-size:.71rem;background:var(--tg);color:var(--tgt);padding:2px 7px;border-radius:999px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ap-btn{background:none;border:1px solid var(--bd);color:var(--mu);font-size:.71rem;padding:2px 9px;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ap-btn:active{border-color:var(--ap);color:var(--ap)}

/* ── Append input ── */
.ap-in{border-top:1px solid var(--bd);padding:8px 12px;display:flex;gap:8px;align-items:flex-end}
.ap-ta{flex:1;background:transparent;border:none;border-bottom:1px solid var(--ap);color:var(--ap);font-family:inherit;font-size:16px;padding:4px 0;resize:none;outline:none;min-height:32px;line-height:1.6}
.ap-ta::placeholder{color:var(--ap);opacity:.4}
.ap-save{background:var(--ap);border:none;color:#fff;font-size:.76rem;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ap-cancel{background:none;border:none;color:var(--mu);font-size:.9rem;padding:4px;cursor:pointer;font-family:inherit}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.22);transition:transform .18s;z-index:30;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.88)}

/* ── Backdrop (input panel) ── */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;animation:fi .18s}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* ── Input wrapper — always in DOM, slides from below ── */
.inp-wrap{position:fixed;left:0;right:0;bottom:0;max-width:640px;margin:0 auto;z-index:41;
  background:var(--sf);border-radius:16px 16px 0 0;border-top:1px solid var(--bd);padding:16px;
  transform:translateY(110%);transition:transform .22s ease-out}
.inp-wrap.open{transform:translateY(0)}
.drag-bar{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 14px}
.inp-ttl{width:100%;background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--tx);font-family:inherit;font-size:16px;font-weight:600;padding:6px 0;margin-bottom:10px;outline:none}
.inp-ttl::placeholder{color:var(--mu);font-weight:400}
.inp-body{width:100%;background:transparent;border:none;color:var(--tx);font-family:inherit;font-size:16px;padding:4px 0;min-height:80px;resize:none;outline:none;line-height:1.75}
.inp-body::placeholder{color:var(--mu)}
.tag-suggest{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 0 4px;border-top:1px solid var(--bd);margin-top:6px}
.tag-suggest::-webkit-scrollbar{display:none}
.tg-sug{white-space:nowrap;padding:3px 10px;border-radius:999px;font-size:.76rem;background:var(--tg);color:var(--tgt);border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.pan-acts{display:flex;align-items:center;gap:8px;margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.blt-btn{background:none;border:1px solid var(--bd);color:var(--mu);padding:4px 10px;border-radius:6px;font-size:.76rem;cursor:pointer;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.blt-btn.on{border-color:var(--ac);color:var(--ac)}
.hash-btn{background:none;border:1px solid var(--bd);color:var(--mu);padding:4px 10px;border-radius:6px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.hash-btn:active{border-color:var(--ac);color:var(--ac)}
.save-btn{margin-left:auto;background:var(--ac);border:none;color:#fff;font-family:inherit;font-size:.88rem;padding:7px 18px;border-radius:8px;cursor:pointer;font-weight:600}
.cnc-btn{background:none;border:1px solid var(--bd);color:var(--mu);font-family:inherit;font-size:.88rem;padding:7px 14px;border-radius:8px;cursor:pointer}

/* ── Theme overlay ── */
.th-ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;animation:fi .18s}
.th-panel{width:100%;max-width:640px;margin:0 auto;background:var(--sf);border-radius:16px 16px 0 0;border-top:1px solid var(--bd);padding:16px}
.th-label{font-size:.82rem;color:var(--mu);margin-bottom:12px}
.th-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.th-item{background:none;border:1px solid var(--bd);border-radius:8px;padding:8px 4px;cursor:pointer;font-family:inherit;font-size:.78rem;color:var(--tx);text-align:center;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.th-item.on{border-color:var(--ac);color:var(--ac)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = "hamunotes-v2";

const THEMES = [
  { id:"cafe",      name:"☕ カフェ",   vars:{"--bg":"#f8f0e4","--sf":"#ffffff","--bd":"#e8d4b8","--tx":"#3a1e08","--mu":"#a07848","--ac":"#8b4c1a","--tg":"#f0e0c8","--tgt":"#8b4c1a","--ap":"#2a7a2a","--st":"#c07820"}},
  { id:"simple",    name:"⬜ シンプル",  vars:{"--bg":"#f7f7f6","--sf":"#ffffff","--bd":"#e2e2e0","--tx":"#1a1a18","--mu":"#999",    "--ac":"#1a1a18","--tg":"#eee",    "--tgt":"#555",    "--ap":"#2d7a2d","--st":"#e8a020"}},
  { id:"dreamcore", name:"✨ ドリーム",  vars:{"--bg":"#f2eeff","--sf":"#ffffff","--bd":"#d8ccff","--tx":"#2a1a60","--mu":"#8870c0","--ac":"#6040c8","--tg":"#e8e0ff","--tgt":"#6040c8","--ap":"#3a8a3a","--st":"#c09020"}},
  { id:"dot",       name:"◉ ドット",    vars:{"--bg":"#f0f6f0","--sf":"#ffffff","--bd":"#c8ddc8","--tx":"#1a2e1a","--mu":"#6a8a6a","--ac":"#2a7a3a","--tg":"#e0f0e0","--tgt":"#2a7a3a","--ap":"#2a7a3a","--st":"#c07820"}},
  { id:"gradient",  name:"🌈 グラデ",   vars:{"--bg":"#eef2ff","--sf":"#ffffff","--bd":"#c8d4ff","--tx":"#1a1a5a","--mu":"#6068b0","--ac":"#4050d0","--tg":"#e0e6ff","--tgt":"#4050d0","--ap":"#2a7a2a","--st":"#c07820"}},
  { id:"spring",    name:"🌸 春",       vars:{"--bg":"#fff5f8","--sf":"#ffffff","--bd":"#ffd6e8","--tx":"#3a2030","--mu":"#c09090","--ac":"#e0608a","--tg":"#ffe8f0","--tgt":"#cc4466","--ap":"#2a7a2a","--st":"#e8a020"}},
  { id:"summer",    name:"🏖 夏",       vars:{"--bg":"#e8f8ff","--sf":"#ffffff","--bd":"#b0e0f8","--tx":"#0a2040","--mu":"#6090b0","--ac":"#0080cc","--tg":"#d0eef8","--tgt":"#0060a0","--ap":"#2a7a2a","--st":"#e8a020"}},
  { id:"autumn",    name:"🍁 秋",       vars:{"--bg":"#fff8ee","--sf":"#ffffff","--bd":"#f0d8a8","--tx":"#3a1a00","--mu":"#b07030","--ac":"#c05810","--tg":"#ffe8c0","--tgt":"#c05810","--ap":"#2a7a2a","--st":"#c07820"}},
  { id:"winter",    name:"❄️ 冬",       vars:{"--bg":"#eef5ff","--sf":"#ffffff","--bd":"#c0d8f4","--tx":"#0a1e40","--mu":"#5070a0","--ac":"#1a50c0","--tg":"#d8eaff","--tgt":"#1a50c0","--ap":"#2a7a2a","--st":"#c07820"}},
];

function extractTags(text = "") {
  const m = text.match(/#[\w\u3040-\u30FF\u4E00-\u9FFF]+/g);
  return m ? [...new Set(m)] : [];
}

function formatDate(ts) {
  const d = new Date(ts);
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function withMath(text = "") {
  return text.replace(/(\d[\d\s+\-*/().]*=)/g, m => {
    try {
      const expr = m.slice(0,-1).trim();
      const r = Function('"use strict";return(' + expr + ')')();
      if (typeof r === "number" && isFinite(r)) return m + r;
    } catch {}
    return m;
  });
}

function TagHighlight({ text = "" }) {
  const parts = text.split(/(#[\w\u3040-\u30FF\u4E00-\u9FFF]+)/g);
  return parts.map((p, i) =>
    p.startsWith("#")
      ? <span key={i} style={{background:"var(--tg)",color:"var(--tgt)",borderRadius:"3px",padding:"0 3px",fontSize:"0.83em"}}>{p}</span>
      : p
  );
}

function MemoApp() {
  // ── State ──
  const [memos, setMemos] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [themeIdx, setThemeIdx] = useState(0);
  const [showInput, setShowInput] = useState(false);
  const [showTheme, setShowTheme] = useState(false);
  const [title, setTitle]   = useState("");
  const [body, setBody]     = useState("");
  const [bullet, setBullet] = useState(false);
  const [activeTag, setActiveTag] = useState(null);
  const [search, setSearch] = useState("");
  const [appendId, setAppendId] = useState(null);
  const [appendTxt, setAppendTxt] = useState("");

  const titleRef  = useRef(null);
  const bodyRef   = useRef(null);
  const appendRef = useRef(null);
  const importRef = useRef(null);

  // ── Theme ──
  useEffect(() => {
    const root = document.documentElement;
    Object.entries(THEMES[themeIdx].vars).forEach(([k,v]) => root.style.setProperty(k,v));
  }, [themeIdx]);

  // ── Persist ──
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(memos)); } catch {}
  }, [memos]);

  // ── Append focus ──
  useEffect(() => {
    if (appendId) setTimeout(() => appendRef.current?.focus(), 80);
  }, [appendId]);

  // ── Derived ──
  const allTags = [...new Set(memos.flatMap(m => m.tags))];
  const filtered = memos.filter(m => {
    const tOk = activeTag ? m.tags.includes(activeTag) : true;
    const sOk = search ? (m.title+m.body).toLowerCase().includes(search.toLowerCase()) : true;
    return tOk && sOk;
  });

  // ── Handlers ──
  const saveMemo = () => {
    const t = title.trim(), b = body.trim();
    if (!t && !b) return;
    const tags = [...new Set([...extractTags(title), ...extractTags(body)])];
    setMemos(prev => [...prev, {
      id: Date.now(), title:t, body:b, tags,
      createdAt: Date.now(), starred:false, appends:[],
    }]);
    setTitle(""); setBody(""); setBullet(false); setShowInput(false);
  };

  const toggleStar   = id => setMemos(prev => prev.map(m => m.id===id ? {...m, starred:!m.starred} : m));
  const delMemo      = id => setMemos(prev => prev.filter(m => m.id!==id));
  const deleteAppend = (memoId, idx) => setMemos(prev => prev.map(m =>
    m.id===memoId ? {...m, appends:m.appends.filter((_,i) => i!==idx)} : m
  ));

  const saveAppend = id => {
    const txt = appendTxt.trim();
    if (!txt) { setAppendId(null); return; }
    setMemos(prev => prev.map(m => m.id===id ? {
      ...m,
      tags: [...new Set([...m.tags, ...extractTags(txt)])],
      appends: [...(m.appends||[]), { text:txt, createdAt:Date.now() }],
    } : m));
    setAppendTxt(""); setAppendId(null);
  };

  const exportData = () => {
    const json = JSON.stringify(memos, null, 2);
    const uri = "data:application/json;charset=utf-8," + encodeURIComponent(json);
    const a = document.createElement("a");
    a.href = uri;
    a.download = `hamunotes-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const importData = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) return;
        setMemos(prev => {
          const ids = new Set(prev.map(m => m.id));
          const fresh = imported.filter(m => !ids.has(m.id));
          return [...prev, ...fresh].sort((a,b) => a.createdAt - b.createdAt);
        });
      } catch {}
    };
    reader.readAsText(file); e.target.value = "";
  };

  // Open input panel and focus title
  // inp-wrap is always in DOM (transform:translateY(110%)) so focus works on iOS
  const openInput = () => {
    setShowInput(true);
    titleRef.current?.focus();
  };
  const closeInput = () => { setShowInput(false); };

  // Bullet toggle: starts immediately, keyboard stays via onTouchStart preventDefault
  const toggleBullet = () => {
    const next = !bullet;
    setBullet(next);
    if (next) {
      setBody(b => {
        if (b === "" || b.endsWith("\n")) return b + "・";
        if (b.endsWith("・")) return b;
        return b + "\n・";
      });
      requestAnimationFrame(() => {
        const ta = bodyRef.current;
        if (ta) ta.selectionStart = ta.selectionEnd = ta.value.length;
      });
    }
  };

  // Insert text at cursor in body textarea
  const insertBody = text => {
    const ta = bodyRef.current;
    const pos = ta ? ta.selectionStart : body.length;
    const before = body.slice(0, pos);
    const sep = pos === 0 || before.endsWith("\n") || before.endsWith(" ") ? "" : " ";
    const next = before + sep + text + body.slice(pos);
    setBody(next);
    requestAnimationFrame(() => {
      ta?.focus();
      if (ta) ta.selectionStart = ta.selectionEnd = pos + sep.length + text.length;
    });
  };

  const handleTitleKey = e => {
    if (e.key === "Enter") { e.preventDefault(); bodyRef.current?.focus(); }
  };

  const handleBodyKey = e => {
    if (bullet && e.key === "Enter") {
      e.preventDefault();
      const ta = bodyRef.current;
      const pos = ta.selectionStart;
      const before = body.slice(0, pos);
      const lastNL = before.lastIndexOf("\n");
      const curLine = before.slice(lastNL + 1);
      if (curLine === "・") {
        setBody(lastNL >= 0 ? body.slice(0, lastNL) + body.slice(pos) : body.slice(pos));
        setBullet(false);
        setTimeout(() => { ta.selectionStart = ta.selectionEnd = Math.max(0, lastNL); }, 0);
      } else {
        setBody(body.slice(0, pos) + "\n・" + body.slice(pos));
        setTimeout(() => { ta.selectionStart = ta.selectionEnd = pos + 2; }, 0);
      }
    }
  };

  // ── Render ──
  return (
    <div className="app">

      {/* Header */}
      <div className="hd">
        <div className="hd-top">
          <div className="app-ttl">✏ メモ帳</div>
          <button className="bkp-btn" onClick={exportData}>📤 出力</button>
          <button className="bkp-btn" onClick={() => importRef.current?.click()}>📥 読込</button>
          <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importData} />
          <button className="theme-btn" onClick={() => setShowTheme(true)}>🎨 テーマ</button>
        </div>
        <input className="srch" placeholder="🔍 検索..." value={search}
          onChange={e => setSearch(e.target.value)} />
        {allTags.length > 0 && (
          <div className="tags-row">
            <button className={`tg-chip ${!activeTag?"on":""}`} onClick={() => setActiveTag(null)}>すべて</button>
            {allTags.map(t => (
              <button key={t} className={`tg-chip ${activeTag===t?"on":""}`}
                onClick={() => setActiveTag(activeTag===t ? null : t)}>{t}</button>
            ))}
          </div>
        )}
      </div>

      {/* Memo list */}
      <div className="list">
        {filtered.length === 0 && (
          <div className="empty">メモがありません<br />右下の ✏ ボタンで追加できます</div>
        )}
        {filtered.map(m => (
          <div key={m.id} className={`card ${m.starred?"starred":""}`}>

            <div className="c-head">
              <button className={`star ${m.starred?"on":""}`} onClick={() => toggleStar(m.id)}>
                {m.starred ? "★" : "☆"}
              </button>
              <div className="ts">{formatDate(m.createdAt)}</div>
              {!m.starred && <button className="del" onClick={() => delMemo(m.id)}>✕</button>}
            </div>

            <div className="c-body">
              {m.title && <div className="c-title"><TagHighlight text={m.title} /></div>}
              {m.body  && <div className="c-text"><TagHighlight text={withMath(m.body)} /></div>}
              {m.appends?.length > 0 && (
                <div className="ap-list">
                  {m.appends.map((a,i) => (
                    <div key={i} className="ap-block">
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <div className="ap-date">+ {formatDate(a.createdAt)} 追記</div>
                        <button className="ap-del" onClick={() => deleteAppend(m.id, i)}>✕</button>
                      </div>
                      <div className="ap-txt"><TagHighlight text={a.text} /></div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="c-foot">
              <div className="c-tags">
                {m.tags.map(t => (
                  <span key={t} className="c-tag"
                    onClick={() => setActiveTag(activeTag===t ? null : t)}>{t}</span>
                ))}
              </div>
              {appendId !== m.id && (
                <button className="ap-btn"
                  onClick={() => { setAppendId(m.id); setAppendTxt(""); }}>+ 追記</button>
              )}
            </div>

            {appendId === m.id && (
              <div className="ap-in">
                <textarea ref={appendRef} className="ap-ta" placeholder="追記内容..."
                  value={appendTxt} onChange={e => setAppendTxt(e.target.value)} rows={2} />
                <button className="ap-cancel" onClick={() => setAppendId(null)}>✕</button>
                <button className="ap-save" onClick={() => saveAppend(m.id)}>保存</button>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* FAB — hidden while input panel is open */}
      {!showInput && (
        <button className="fab"
          onTouchEnd={e => { e.preventDefault(); openInput(); }}
          onClick={openInput}
        >✏</button>
      )}

      {/* Backdrop — conditionally rendered */}
      {showInput && <div className="backdrop" onClick={closeInput} />}

      {/* Input panel — ALWAYS in DOM (transform:translateY below viewport)
          This lets iOS .focus() work from within the touch event handler */}
      <div className={`inp-wrap ${showInput?"open":""}`}>
        <div className="drag-bar" />
        <input ref={titleRef} className="inp-ttl"
          placeholder="タイトル（Enterで本文へ）"
          value={title} onChange={e => setTitle(e.target.value)}
          onKeyDown={handleTitleKey} />
        <textarea ref={bodyRef} className="inp-body"
          placeholder={bullet ? "・箇条書きモード（空行でOFF）" : "本文… #タグ、100+200= も使えます"}
          value={body} onChange={e => setBody(e.target.value)}
          onKeyDown={handleBodyKey} rows={4} />

        {allTags.length > 0 && (
          <div className="tag-suggest">
            {allTags.map(t => (
              <button key={t} className="tg-sug"
                onMouseDown={e => e.preventDefault()}
                onTouchStart={e => e.preventDefault()}
                onTouchEnd={e => { e.preventDefault(); insertBody(t+" "); }}
                onClick={() => insertBody(t+" ")}>{t}</button>
            ))}
          </div>
        )}

        <div className="pan-acts">
          <button className={`blt-btn ${bullet?"on":""}`}
            onMouseDown={e => e.preventDefault()}
            onTouchStart={e => e.preventDefault()}
            onTouchEnd={e => { e.preventDefault(); toggleBullet(); }}
            onClick={toggleBullet}>
            {bullet ? "● 箇条書き ON" : "○ 箇条書き"}
          </button>
          <button className="hash-btn"
            onMouseDown={e => e.preventDefault()}
            onTouchStart={e => e.preventDefault()}
            onTouchEnd={e => { e.preventDefault(); insertBody("#"); }}
            onClick={() => insertBody("#")}>#</button>
          <button className="cnc-btn" onClick={closeInput}>キャンセル</button>
          <button className="save-btn" onClick={saveMemo}>保存</button>
        </div>
      </div>

      {/* Theme picker — own overlay, independent of input panel */}
      {showTheme && (
        <div className="th-ovl" onClick={e => e.target===e.currentTarget && setShowTheme(false)}>
          <div className="th-panel">
            <div className="drag-bar" />
            <div className="th-label">テーマを選ぶ</div>
            <div className="th-grid">
              {THEMES.map((t,i) => (
                <button key={t.id} className={`th-item ${i===themeIdx?"on":""}`}
                  onClick={() => { setThemeIdx(i); setShowTheme(false); }}>{t.name}</button>
              ))}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MemoApp />);
</script>
</body>
</html>
