<!DOCTYPE html>
<html lang="ja" data-theme="pop">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="メモ帳">
<title>メモ帳</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect width='96' height='96' rx='20' fill='%231A2E78'/><text x='48' y='65' font-size='52' text-anchor='middle'>✏</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* ── Themes ── */

/* 🎈 ポップ：明るい背景 × 赤アクセント */
[data-theme="pop"]{
  --bg:#F0F9FF;--sf:#FFFFFF;--sf2:#EBF6FF;--pb:#FFFFFF;
  --bo:#FFD0B8;--bo2:#FFBE9A;
  --ac:#FF3030;--ar:255,48,48;
  --tx:#0A0A0A;--td:#111111;--tm:#884040;--tf:#AA6868;--tg:#999999;--tv:#CCBBBB;
  --dl:#CC0000;--cl:#0066AA;
}

/* 🌃 ナイト：淡いパープル背景 × ネイビーアクセント */
[data-theme="night"]{
  --bg:#EDF1FF;--sf:#FFFFFF;--sf2:#E8EEFF;--pb:#FFFFFF;
  --bo:#C0CCEE;--bo2:#A8BADD;
  --ac:#1A2E78;--ar:26,46,120;
  --tx:#060A18;--td:#0A1020;--tm:#3A4878;--tf:#606898;--tg:#8890C0;--tv:#C0C8E8;
  --dl:#CC3333;--cl:#3a7a3a;
}

/* 🩶 アッシュ：クリーム背景 × スレートアクセント */
[data-theme="ash"]{
  --bg:#FAF3E0;--sf:#FFFFFF;--sf2:#F5EDD5;--pb:#FFFFFF;
  --bo:#DDD5C0;--bo2:#C8C0A8;
  --ac:#708090;--ar:112,128,144;
  --tx:#0A0905;--td:#111008;--tm:#706858;--tf:#908878;--tg:#999080;--tv:#C8C0B0;
  --dl:#A03030;--cl:#508050;
}

/* ✨ アンバー：温かいクリーム背景 × ブラウンアクセント */
[data-theme="amber"]{
  --bg:#FFF8EC;--sf:#FFFFFF;--sf2:#FFF4E0;--pb:#FFFFFF;
  --bo:#E8D8B8;--bo2:#D8C898;
  --ac:#8B4513;--ar:139,69,19;
  --tx:#0A0500;--td:#150A00;--tm:#7A5030;--tf:#9A7050;--tg:#AA8860;--tv:#D8B898;
  --dl:#CC3333;--cl:#3a8a3a;
}

/* ── Base ── */
html,body{height:100%}
body{
  font-family:'Noto Sans JP','ヒラギノ角ゴ ProN','Hiragino Kaku Gothic ProN',sans-serif;
  background:var(--bg);color:var(--tx);
  display:flex;flex-direction:column;
  max-width:680px;margin:0 auto;
  height:100dvh;overflow:hidden;
  transition:background .35s,color .35s;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bo2);border-radius:2px}

/* ── Background effects ── */
#bge{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ポップ：オレンジ×スカイブルーのドット */
[data-theme="pop"] #bge{
  background-image:
    radial-gradient(circle,rgba(255,165,0,.22) 2px,transparent 2px),
    radial-gradient(circle,rgba(135,206,250,.28) 2px,transparent 2px);
  background-size:26px 26px,42px 42px;background-position:0 0,13px 13px;
}
/* ナイト：薄いネイビードット */
[data-theme="night"] #bge{
  background-image:radial-gradient(circle,rgba(26,46,120,.12) 2px,transparent 2px);
  background-size:28px 28px;
}
/* アンバー：薄いブラウンドット */
[data-theme="amber"] #bge{
  background-image:radial-gradient(circle,rgba(139,69,19,.1) 2px,transparent 2px);
  background-size:28px 28px;
}

#app{position:relative;z-index:1;display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ── Header ── */
.header{
  flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px 12px;padding-top:calc(14px + env(safe-area-inset-top));
  border-bottom:1px solid var(--bo);background:var(--bg);
  transition:background .35s;
}
.hl{display:flex;align-items:baseline;gap:10px}
.hr{display:flex;gap:4px}
.logo{font-family:'Space Mono','Courier New',monospace;font-size:15px;font-weight:700;color:var(--ac);letter-spacing:.05em}
.cnt{font-size:12px;color:var(--tf)}
.ofbadge{display:none;font-size:10px;font-family:'Space Mono',monospace;color:var(--tm);background:var(--bo);padding:2px 7px;border-radius:10px}
body.offline .ofbadge{display:inline}
.ibtn{font-size:15px;padding:5px 7px;border-radius:5px;color:var(--tf);transition:color .2s,background .2s}
.ibtn:hover,.ibtn.on{color:var(--ac);background:rgba(var(--ar),.1)}

/* ── Search ── */
.sbar{flex-shrink:0;display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--bo);gap:8px}
.sinput{flex:1;background:transparent;border:none;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none}
.sinput::placeholder{color:var(--tv)}
.clrbtn{color:var(--tf);font-size:13px;padding:2px 4px}

/* ── Tag bar ── */
.tbar{flex-shrink:0;display:flex;flex-wrap:wrap;gap:6px;padding:10px 18px;border-bottom:1px solid var(--bo)}
.tc{font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--bo2);color:var(--tm);background:transparent;transition:all .15s}
.tc.on{background:rgba(var(--ar),.12);border-color:var(--ac);color:var(--ac)}

/* ── List ── */
.list{flex:1;overflow-y:auto;padding:0 20px}
.empty{text-align:center;color:var(--tv);font-size:13px;padding:60px 0;font-style:italic}

/* ── Memo item ── */
.mitem{padding:15px 0 13px;border-bottom:1px solid var(--bo)}
.mitem:last-child{border-bottom:none}

.mhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.mhead-left{display:flex;align-items:baseline;gap:8px;flex:1;min-width:0;flex-wrap:wrap}

/* タイムスタンプ・タイトル：同じ太字スタイル */
.mts{
  font-family:'Space Mono','Courier New',monospace;
  font-size:12px;font-weight:700;
  color:var(--tx);letter-spacing:.03em;flex-shrink:0;
}
.mtitle{
  font-size:13px;font-weight:700;
  color:var(--tx);word-break:break-word;line-height:1.4;
}

.dbtn{flex-shrink:0;font-size:11px;color:var(--tv);padding:2px 5px;border-radius:3px;transition:color .15s;margin-top:1px}
.dbtn:hover{color:var(--dl)}

/* 本文 */
.mbody{font-size:14px;line-height:1.8;color:var(--td);white-space:pre-wrap;word-break:break-word}
.mbody.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.expand-btn{display:inline-block;margin-top:5px;font-size:11px;font-family:'Space Mono',monospace;color:var(--ac);opacity:.75;transition:opacity .15s}
.expand-btn:hover{opacity:1}

.thl{color:var(--ac);font-weight:700}
.cr{color:var(--cl);font-family:'Space Mono',monospace;font-size:13px;font-weight:700}

.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.itag{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--bo2);color:rgba(var(--ar),.6);background:transparent;transition:all .15s}
.itag:hover,.itag.on{border-color:var(--ac);color:var(--ac)}

/* ── Input（下固定） ── */
.input-fixed{
  flex-shrink:0;background:var(--pb);
  border-top:2px solid var(--ac);
  padding:10px 18px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  transition:background .35s,border-color .35s;
}
.title-field{
  width:100%;background:transparent;border:none;outline:none;
  font-size:14px;font-weight:700;color:var(--tx);
  font-family:'Noto Sans JP',sans-serif;
  padding:4px 0 8px;border-bottom:1px solid var(--bo);transition:border-color .2s;
}
.title-field::placeholder{color:var(--tv);font-weight:400}
.title-field:focus{border-bottom-color:var(--ac)}
.body-field{
  width:100%;background:transparent;border:none;outline:none;resize:none;
  font-size:14px;line-height:1.75;color:var(--tx);
  font-family:'Noto Sans JP',sans-serif;padding:8px 0 4px;
}
.body-field::placeholder{color:var(--tv)}
.ifoot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.ifl{display:flex;align-items:center;gap:8px}
.bbtn{
  font-size:15px;font-weight:700;width:28px;height:28px;border-radius:6px;
  border:1px solid var(--bo2);color:var(--tf);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.bbtn:hover{color:var(--ac);border-color:var(--ac)}
.bbtn.on{background:rgba(var(--ar),.12);border-color:var(--ac);color:var(--ac)}
.hint{font-size:11px;color:var(--tv);font-family:'Space Mono',monospace}
.svbtn{
  font-family:'Space Mono','Courier New',monospace;font-size:12px;font-weight:700;
  padding:7px 20px;background:var(--ac);color:var(--bg);
  border-radius:4px;letter-spacing:.05em;transition:opacity .2s;
}
.svbtn:disabled{opacity:.35;cursor:default}

/* ── Theme panel ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90}
#ov.on{display:block}
.tpanel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:680px;
  background:var(--pb);border-top:1px solid var(--bo);
  border-radius:16px 16px 0 0;
  padding:16px 18px;padding-bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:100;box-shadow:0 -4px 30px rgba(0,0,0,.2);transition:background .35s;
}
.tptitle{font-family:'Space Mono',monospace;font-size:11px;color:var(--tf);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.tprow{display:flex;gap:8px}
.tpbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 8px;border-radius:12px;border:1px solid var(--bo2);
  color:var(--tm);font-size:11px;font-family:'Noto Sans JP',sans-serif;transition:all .15s;
}
.tpbtn .em{font-size:22px}
.tpbtn:hover{border-color:var(--ac);color:var(--tx)}
.tpbtn.on{background:rgba(var(--ar),.12);border-color:var(--ac);color:var(--ac)}
.swatch{display:flex;gap:3px;margin-top:3px}
.sw{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>

<div id="bge" aria-hidden="true"></div>
<div id="ov" onclick="closePanel()"></div>

<div id="app">
  <div class="header">
    <div class="hl">
      <span class="logo">✏ メモ帳</span>
      <span class="cnt" id="cnt">0 件</span>
      <span class="ofbadge">オフライン</span>
    </div>
    <div class="hr">
      <button class="ibtn" id="sbtn" onclick="toggleSearch()" title="検索">🔍</button>
      <button class="ibtn" onclick="exportMemos()" title="バックアップ">💾</button>
      <button class="ibtn" onclick="document.getElementById('importfile').click()" title="復元">📂</button>
      <input type="file" id="importfile" accept=".json" style="display:none" onchange="importMemos(event)">
      <button class="ibtn" id="tbtn" onclick="togglePanel()" title="テーマ">🎨</button>
    </div>
  </div>

  <div class="sbar" id="sbar" style="display:none">
    <input class="sinput" id="sinput" placeholder="キーワードで検索..." oninput="render()">
    <button class="clrbtn" onclick="clearSearch()">✕</button>
  </div>

  <div class="tbar" id="tbar" style="display:none"></div>

  <div class="list" id="list"></div>

  <div class="input-fixed">
    <input class="title-field" id="titleinput" placeholder="タイトル（省略可）" oninput="updateBtn()">
    <textarea class="body-field" id="minput" rows="3"
      placeholder="本文... #タグ も使えます&#10;（Ctrl+Enter で保存）"
      onkeydown="onKey(event)" oninput="updateBtn()"></textarea>
    <div class="ifoot">
      <div class="ifl">
        <button class="bbtn" id="bbtn" onclick="toggleBullet()" title="箇条書き">・</button>
        <span class="hint" id="hint">Ctrl+Enter で保存</span>
      </div>
      <button class="svbtn" id="svbtn" onclick="addMemo()" disabled>保存</button>
    </div>
  </div>
</div>

<div class="tpanel" id="tpanel" style="display:none">
  <div class="tptitle">テーマを選ぶ</div>
  <div class="tprow" id="tpmain"></div>
</div>

<script>
const MK='hamu-memos-v5', TK='hamu-theme-v6';

const THEMES=[
  {id:'pop',   em:'🎈',label:'ポップ',  c:['#FF3030','#FFA500','#87CEFA']},
  {id:'night', em:'🌃',label:'ナイト',  c:['#EDF1FF','#1A2E78','#6B8E23']},
  {id:'ash',   em:'🩶',label:'アッシュ',c:['#FAF3E0','#708090','#A9A9A9']},
  {id:'amber', em:'✨',label:'アンバー',c:['#FFF8EC','#8B4513','#FFDB58']},
];

let memos=[], activeTag=null, bulletMode=false;
let curTheme=localStorage.getItem(TK)||'pop';
const expanded=new Set();

function load(){try{memos=JSON.parse(localStorage.getItem(MK)||'[]')}catch{memos=[]}}
function save(){localStorage.setItem(MK,JSON.stringify(memos))}

function extractTags(t){const m=t.match(/#[\w\u3040-\u30FF\u4E00-\u9FFF\uAC00-\uD7AF]+/g);return m?[...new Set(m)]:[]}
function fmtDate(ts){const d=new Date(ts),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hlTags(s){return esc(s).replace(/#[\w\u3040-\u30FF\u4E00-\u9FFF\uAC00-\uD7AF]+/g,m=>`<span class="thl">${m}</span>`)}

function calcLine(line){
  if(!/=\s*$/.test(line)) return hlTags(line);
  const bq=line.replace(/=\s*$/,'');
  const m=bq.match(/([\d.\s\+\-\*\/\(\)%]+)$/);
  if(!m) return hlTags(line);
  const expr=m[1].trim();
  if(!expr||!/[\+\-\*\/]/.test(expr)||!/^[\d.\s\+\-\*\/\(\)%]+$/.test(expr)) return hlTags(line);
  try{
    const result=Function('"use strict";return('+expr+')')();
    if(typeof result!=='number'||!isFinite(result)) return hlTags(line);
    const r=Number.isInteger(result)?String(result):parseFloat(result.toFixed(6)).toString();
    const prefix=bq.slice(0,bq.length-m[1].length);
    return hlTags(prefix+expr+'= ')+`<span class="cr">${esc(r)}</span>`;
  }catch{return hlTags(line)}
}
function renderText(text){return text.split('\n').map(calcLine).join('\n')}

function addMemo(){
  const title=document.getElementById('titleinput').value.trim();
  const text=document.getElementById('minput').value.trim();
  if(!text) return;
  const allText=(title?title+' ':'')+text;
  memos.push({id:Date.now(),title,text,tags:extractTags(allText),createdAt:Date.now()});
  save();
  document.getElementById('titleinput').value='';
  document.getElementById('minput').value='';
  updateBtn();
  bulletMode=false;document.getElementById('bbtn').classList.remove('on');
  render();
  requestAnimationFrame(()=>{
    const list=document.getElementById('list');
    list.scrollTo({top:list.scrollHeight,behavior:'smooth'});
  });
  document.getElementById('minput').focus();
}

function deleteMemo(id){memos=memos.filter(m=>m.id!==id);expanded.delete(id);save();render()}
function toggleTag(tag){activeTag=activeTag===tag?null:tag;render()}
function toggleExpand(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render()}

function toggleBullet(){
  bulletMode=!bulletMode;
  document.getElementById('bbtn').classList.toggle('on',bulletMode);
  const ta=document.getElementById('minput');
  if(bulletMode){
    const val=ta.value,s=ta.selectionStart;
    if(!val.trim()){ta.value='・ ';ta.setSelectionRange(2,2)}
    else{
      const lstart=val.slice(0,s).lastIndexOf('\n')+1;
      const lend=val.indexOf('\n',lstart)===-1?val.length:val.indexOf('\n',lstart);
      if(!val.slice(lstart,lend).startsWith('・')){
        ta.value=val.slice(0,lstart)+'・ '+val.slice(lstart);ta.setSelectionRange(s+2,s+2);
      }
    }
  }
  ta.focus();
}

function onKey(e){
  const ta=e.target;
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();addMemo();return}
  if(e.key==='Enter'&&bulletMode&&!e.ctrlKey&&!e.metaKey){
    e.preventDefault();
    const s=ta.selectionStart,before=ta.value.slice(0,s),after=ta.value.slice(ta.selectionEnd);
    const cur=before.split('\n').pop();
    if(cur==='・ '||cur==='・'){
      ta.value=before.slice(0,before.length-cur.length)+after;
      ta.setSelectionRange(before.length-cur.length,before.length-cur.length);
      bulletMode=false;document.getElementById('bbtn').classList.remove('on');
    } else{ta.value=before+'\n・ '+after;ta.setSelectionRange(s+3,s+3)}
    updateBtn();
  }
}

function toggleSearch(){
  const bar=document.getElementById('sbar'),btn=document.getElementById('sbtn'),open=bar.style.display==='none';
  bar.style.display=open?'flex':'none';btn.classList.toggle('on',open);
  if(open) document.getElementById('sinput').focus();
  else{document.getElementById('sinput').value='';render()}
}
function clearSearch(){document.getElementById('sinput').value='';render()}
function updateBtn(){document.getElementById('svbtn').disabled=!document.getElementById('minput').value.trim()}

function setTheme(id){document.documentElement.setAttribute('data-theme',id);curTheme=id;localStorage.setItem(TK,id);renderTP()}
function togglePanel(){
  const p=document.getElementById('tpanel'),ov=document.getElementById('ov'),btn=document.getElementById('tbtn');
  const open=p.style.display!=='none';
  p.style.display=open?'none':'block';ov.classList.toggle('on',!open);btn.classList.toggle('on',!open);
}
function closePanel(){
  document.getElementById('tpanel').style.display='none';
  document.getElementById('ov').classList.remove('on');
  document.getElementById('tbtn').classList.remove('on');
}
function renderTP(){
  document.getElementById('tpmain').innerHTML=THEMES.map(t=>`
    <button class="tpbtn ${curTheme===t.id?'on':''}" onclick="setTheme('${t.id}')">
      <span class="em">${t.em}</span><span>${t.label}</span>
      <div class="swatch">${t.c.map(c=>`<div class="sw" style="background:${c};border:1px solid rgba(0,0,0,.1)"></div>`).join('')}</div>
    </button>`).join('');
}

function render(){
  const q=(document.getElementById('sinput')?.value||'').toLowerCase();
  const allTags=[...new Set(memos.flatMap(m=>m.tags))];
  const tbar=document.getElementById('tbar');
  if(allTags.length){
    tbar.style.display='flex';
    tbar.innerHTML=`<button class="tc ${!activeTag?'on':''}" onclick="toggleTag(null)">すべて</button>`
      +allTags.map(t=>`<button class="tc ${activeTag===t?'on':''}" onclick="toggleTag('${t}')">${esc(t)}</button>`).join('');
  } else{tbar.style.display='none'}

  const filtered=memos.filter(m=>
    (!activeTag||m.tags.includes(activeTag))&&
    (!q||(m.title||'').toLowerCase().includes(q)||m.text.toLowerCase().includes(q))
  );
  document.getElementById('cnt').textContent=memos.length+' 件';

  const list=document.getElementById('list');
  if(!filtered.length){
    list.innerHTML=`<p class="empty">${memos.length?'該当するメモがありません':'まだメモがありません'}</p>`;
    return;
  }

  list.innerHTML=filtered.map(m=>{
    const ts=fmtDate(m.createdAt);
    const hasTitle=m.title&&m.title.trim();
    const isLong=m.text.split('\n').length>4||m.text.length>200;
    const isExp=expanded.has(m.id);

    // タイムスタンプ + タイトル：どちらも同じ太字スタイル
    const headHtml=`<span class="mts">${ts}</span>${hasTitle?`<span class="mtitle">${esc(m.title)}</span>`:''}`;

    const bodyHtml=`<p class="mbody ${isLong&&!isExp?'clamp':''}">${renderText(m.text)}</p>`
      +(isLong?`<button class="expand-btn" onclick="toggleExpand(${m.id})">${isExp?'折りたたむ ↑':'続きを読む ↓'}</button>`:'');

    const tagsHtml=m.tags.length
      ?`<div class="ctags">${m.tags.map(t=>`<button class="itag ${activeTag===t?'on':''}" onclick="toggleTag('${t}')">${esc(t)}</button>`).join('')}</div>`:'';

    return`<div class="mitem">
      <div class="mhead">
        <div class="mhead-left">${headHtml}</div>
        <button class="dbtn" onclick="deleteMemo(${m.id})">✕</button>
      </div>
      ${bodyHtml}${tagsHtml}
    </div>`;
  }).join('');
}

function exportMemos(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  const fname=`memo-backup-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`;
  const blob=new Blob([JSON.stringify(memos,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=fname;a.click();
  URL.revokeObjectURL(a.href);
}

function importMemos(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(!confirm(`${data.length}件のメモを復元します。現在のメモと統合されます。よろしいですか？`)) return;
      const existingIds=new Set(memos.map(m=>m.id));
      const merged=[...memos,...data.filter(m=>!existingIds.has(m.id))];
      merged.sort((a,b)=>a.createdAt-b.createdAt);
      memos=merged;save();render();
      alert(`復元完了！合計${memos.length}件のメモがあります。`);
    }catch{alert('ファイルの読み込みに失敗しました。')}
    e.target.value='';
  };
  reader.readAsText(file);
}

window.addEventListener('online',()=>document.body.classList.remove('offline'));
window.addEventListener('offline',()=>document.body.classList.add('offline'));
if(!navigator.onLine) document.body.classList.add('offline');

if('serviceWorker' in navigator){
  const sw=`const C='hamu-sw-v6';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href])));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(ch=>ch.put(e.request,cl));return r})))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

load();
document.documentElement.setAttribute('data-theme',curTheme);
renderTP();render();
requestAnimationFrame(()=>{
  const list=document.getElementById('list');
  list.scrollTop=list.scrollHeight;
});
if(/iPhone|iPad/.test(navigator.userAgent)) document.getElementById('hint').textContent='保存して追加';
</script>
